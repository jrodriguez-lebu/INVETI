# docker-compose.yml — Solo para pruebas locales con Docker
# En producción Dokploy maneja esto automáticamente

services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    environment:
      APP_NAME: INVETI
      APP_ENV: production
      APP_KEY: ${APP_KEY}
      APP_DEBUG: false
      APP_URL: http://localhost:8080
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: inveti
      DB_USERNAME: inveti_user
      DB_PASSWORD: secret
      SESSION_DRIVER: database
      CACHE_STORE: database
      QUEUE_CONNECTION: database
      MAIL_MAILER: log
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - storage_data:/var/www/html/storage/app

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: inveti
      MYSQL_USER: inveti_user
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root_secret
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot_secret"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
  storage_data:
